<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academic Workload Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="text-center mb-4">
            <i class="bi bi-mortarboard-fill text-primary display-4"></i>
            <h3 class="fw-bold mt-2">Welcome Back</h3>
            <p class="text-muted" id="auth-subtitle">Log in to manage your academic workload</p>
        </div>

        <div id="auth-alert" class="alert d-none" role="alert"></div>

        <form id="auth-form" onsubmit="handleAuth(event); return false;">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" required placeholder="Username">
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" required placeholder="Password">
                </div>
            </div>

            <div class="mb-4 d-none" id="confirm-password-wrapper">
                <label for="confirm-password" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirm-password" placeholder="Confirm Password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submit-btn">
                <i class="bi bi-box-arrow-in-right me-1"></i> Log In
            </button>
        </form>

        <div class="text-center mt-4">
            <span class="text-muted" id="switch-text">Don't have an account?</span>
            <a href="#" class="fw-bold text-decoration-none ms-1" id="switch-link" onclick="toggleMode()">Register here</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
