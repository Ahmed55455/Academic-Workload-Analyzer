openapi: 3.0.0
info:
  title: Academic Workload Analyzer API
  description: RESTful API documentation for managing courses and tasks.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server

# Define the groups (tags)
tags:
  - name: Dashboard
    description: Statistics and metrics for the main dashboard
  - name: Courses
    description: Endpoints for managing academic courses
  - name: Tasks
    description: Endpoints for managing assignments and tasks

paths:
  /api/dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Retrieve workload dashboard statistics
      responses:
        '200':
          description: Successfully retrieved statistics

  /api/courses:
    get:
      tags:
        - Courses
      summary: Get all courses
      responses:
        '200':
          description: A list of courses
    post:
      tags:
        - Courses
      summary: Create a new course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "System Analysis and Design"
                instructor:
                  type: string
                  example: "Dr. Ahmed"
      responses:
        '201':
          description: Course created successfully

  /api/courses/{id}:
    put:
      tags:
        - Courses
      summary: Update an existing course
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Numeric ID of the course
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                instructor:
                  type: string
      responses:
        '200':
          description: Course updated successfully
        '404':
          description: Course not found
    delete:
      tags:
        - Courses
      summary: Delete a course and its associated tasks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Course deleted successfully
        '404':
          description: Course not found

  /api/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks
      responses:
        '200':
          description: A list of tasks with associated course names
    post:
      tags:
        - Tasks
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  example: "Finish SAD Project"
                description:
                  type: string
                  example: "Complete the code and documentation"
                status:
                  type: string
                  enum: [pending, in-progress, completed]
                  example: "pending"
                deadline:
                  type: string
                  format: date
                  example: "2026-05-21"
                course_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Task created successfully

  /api/tasks/{id}:
    put:
      tags:
        - Tasks
      summary: Update a task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                deadline:
                  type: string
                  format: date
                course_id:
                  type: integer
      responses:
        '200':
          description: Task updated successfully
        '404':
          description: Task not found
    delete:
      tags:
        - Tasks
      summary: Delete a task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task deleted successfully
        '404':
          description: Task not found